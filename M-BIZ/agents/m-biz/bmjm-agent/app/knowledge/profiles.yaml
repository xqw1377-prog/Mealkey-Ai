# BMJM 典型商业模式画像库 V1

profiles:
  - profile_id: "PROF-SAAS-001"
    name: "标准 SaaS 订阅模式"
    category: "digital"
    characteristics:
      vp_type: "subscription_access"
      cs_type: "b2b_smb"
      ch_type: "direct_sales + inbound"
      cr_type: "account_management"
      rs_type: "monthly_annual_subscription"
      kr_type: "software_platform"
      ka_type: "product_development + customer_success"
      kp_type: "cloud_provider + channel_partners"
      cs_type: "fixed_costs + hosting + sales"
    typical_metrics:
      mrr_growth_rate: "0.10-0.20"
      net_revenue_retention: "1.10-1.30"
      cac_payback_months: "12-18"
      ltv_cac_ratio: "3.0-5.0"
    strengths:
      - "可预测的经常性收入"
      - "高客户生命周期价值"
      - "边际成本递减"
    risks:
      - "客户流失风险"
      - "获客成本上升"
      - "产品同质化竞争"
    maturity_stages:
      seed: "产品市场匹配验证"
      growth: "规模化获客与留存优化"
      mature: "效率提升与生态扩展"
      decline: "创新转型或市场退出"
    match_rules:
      - "rs_types_contains_subscription == true"
      - "vp_type == subscription_access"

  - profile_id: "PROF-FREEMIUM-001"
    name: "免费增值模式"
    category: "digital"
    characteristics:
      vp_type: "freemium_access"
      cs_type: "b2c + b2b"
      ch_type: "product_led_growth + viral"
      cr_type: "self_service + automated"
      rs_type: "free + premium_subscription"
      kr_type: "software_platform + user_data"
      ka_type: "product_development + growth"
      kp_type: "platform_partners"
      cs_type: "hosting + engineering"
    typical_metrics:
      free_to_paid_conversion: "0.02-0.05"
      viral_coefficient: "1.0-1.5"
      cac: "low"
    strengths:
      - "低获客门槛，大规模用户基数"
      - "病毒传播效应"
      - "数据驱动的产品优化"
    risks:
      - "免费用户成本拖累"
      - "付费转化率低下"
      - "竞争对手免费策略"
    maturity_stages:
      seed: "核心价值验证与病毒系数优化"
      growth: "转化漏斗优化与付费功能设计"
      mature: "用户分层运营与 ARPU 提升"
      decline: "变现模式创新或转型"
    match_rules:
      - "rs_types_contains_free == true"
      - "rs_types_contains_premium == true"

  - profile_id: "PROF-PLATFORM-001"
    name: "双边平台模式"
    category: "digital"
    characteristics:
      vp_type: "matchmaking"
      cs_type: "multi_sided"
      ch_type: "digital + viral"
      cr_type: "platform_governance"
      rs_type: "commission + listing_fee + advertising"
      kr_type: "platform_tech + network_effect"
      ka_type: "platform_management + liquidity"
      kp_type: "suppliers + complementors"
      cs_type: "platform_ops + marketing"
    typical_metrics:
      liquidity_ratio: "0.3-0.5"
      take_rate: "0.10-0.25"
      gross_merchandise_value: "high"
    strengths:
      - "强大的网络效应"
      - "规模越大壁垒越高"
      - "多元化收入来源"
    risks:
      - "冷启动困难"
      - "供需失衡风险"
      - "监管与合规风险"
    maturity_stages:
      seed: "冷启动与流动性验证"
      growth: "供需规模同步增长"
      mature: "货币化深度与生态治理"
      decline: "创新或整合"
    match_rules:
      - "cs_has_multi_side == true"
      - "rs_types_contains_commission == true"

  - profile_id: "PROF-HWPLUS-001"
    name: "硬件+服务模式"
    category: "hybrid"
    characteristics:
      vp_type: "integrated_hardware_software"
      cs_type: "b2c_premium + b2b"
      ch_type: "retail + online + channel"
      cr_type: "dedicated_support + community"
      rs_type: "hardware_sales + subscription_service"
      kr_type: "hardware_design + software_platform"
      ka_type: "rd + supply_chain + customer_success"
      kp_type: "component_suppliers + channel"
      cs_type: "cogs + rnd + marketing"
    typical_metrics:
      hardware_margin: "0.20-0.40"
      service_attach_rate: "0.30-0.60"
      customer_lifetime: "3-5 years"
    strengths:
      - "硬件锁定效应"
      - "持续性服务收入"
      - "品牌溢价能力"
    risks:
      - "库存与供应链风险"
      - "硬件研发投入大"
      - "技术迭代周期短"
    maturity_stages:
      seed: "产品原型与 PMF 验证"
      growth: "量产爬坡与渠道扩展"
      mature: "生态丰富与品牌强化"
      decline: "下一代产品研发或转型"
    match_rules:
      - "rs_types_contains_hardware == true"
      - "rs_types_contains_subscription == true"

  - profile_id: "PROF-MFG-001"
    name: "产品制造分销模式"
    category: "traditional"
    characteristics:
      vp_type: "quality_product"
      cs_type: "b2b_distributors + b2c"
      ch_type: "distributors + retail + direct"
      cr_type: "account_management + after_sales"
      rs_type: "product_sales + after_sales_service"
      kr_type: "manufacturing + supply_chain"
      ka_type: "production + quality + logistics"
      kp_type: "raw_material_suppliers + distributors"
      cs_type: "cogs + logistics + sales"
    typical_metrics:
      gross_margin: "0.25-0.45"
      inventory_turnover: "4-8"
      customer_retention: "0.60-0.80"
    strengths:
      - "生产能力壁垒"
      - "供应链控制力"
      - "品牌认知度"
    risks:
      - "库存积压风险"
      - "原材料价格波动"
      - "渠道依赖度高"
    maturity_stages:
      seed: "产品开发与试产"
      growth: "产能扩张与渠道建设"
      mature: "效率提升与品牌溢价"
      decline: "产品线更新或转型"
    match_rules:
      - "rs_types_contains_product_sales == true"
      - "kr_type == manufacturing"

  - profile_id: "PROF-FRANCHISE-001"
    name: "连锁加盟模式"
    category: "traditional"
    characteristics:
      vp_type: "proven_business_model"
      cs_type: "b2c_end_users"
      ch_type: "franchisee_network"
      cr_type: "standardized + local_adaptation"
      rs_type: "franchise_fee + royalty"
      kr_type: "brand + ops_manual + supply_chain"
      ka_type: "franchise_ops + training + qa"
      kp_type: "franchisees + suppliers"
      cs_type: "corporate + franchise_support"
    typical_metrics:
      franchise_roi: "2-5 years payback"
      same_store_sales_growth: "0.03-0.08"
      franchisee_satisfaction: "4.0/5.0"
    strengths:
      - "快速规模化"
      - "轻资产运营"
      - "本地化执行力"
    risks:
      - "加盟商管理难度大"
      - "品牌一致性维护"
      - "法律合规风险"
    maturity_stages:
      seed: "单店模型验证"
      growth: "加盟体系与标准化建设"
      mature: "网络密度优化与品牌升级"
      decline: "模式创新或出售"
    match_rules:
      - "rs_types_contains_franchise_fee == true"
      - "ch_type == franchise"

  - profile_id: "PROF-DATA-001"
    name: "数据变现模式"
    category: "digital"
    characteristics:
      vp_type: "data_insights"
      cs_type: "b2b_enterprise"
      ch_type: "direct_sales + content_marketing"
      cr_type: "dedicated_cs + training"
      rs_type: "data_subscription + api_calls + reports"
      kr_type: "data_pipeline + algorithms + data_scientists"
      ka_type: "data_collection + processing + analytics"
      kp_type: "data_providers + tech_partners"
      cs_type: "infrastructure + talent + acquisition"
    typical_metrics:
      data_coverage: "high"
      data_freshness: "real_time"
      customer_retention: "0.90+"
    strengths:
      - "高边际利润"
      - "数据网络效应"
      - "客户粘性强"
    risks:
      - "数据获取合规风险"
      - "数据质量维护成本高"
      - "技术替代风险"
    maturity_stages:
      seed: "数据源与核心算法验证"
      growth: "数据资产积累与产品化"
      mature: "行业标准制定与生态"
      decline: "新技术范式转型"
    match_rules:
      - "kr_type == data_assets"
      - "rs_types_contains_data == true"

  - profile_id: "PROF-CONTENT-001"
    name: "内容订阅模式"
    category: "digital"
    characteristics:
      vp_type: "premium_content"
      cs_type: "b2c_individuals"
      ch_type: "app_store + web + social"
      cr_type: "self_service + community"
      rs_type: "monthly_yearly_subscription"
      kr_type: "content_library + creators"
      ka_type: "content_creation + curation + distribution"
      kp_type: "creators + distribution_partners"
      cs_type: "content_production + hosting + marketing"
    typical_metrics:
      content_freshness: "daily_weekly"
      subscriber_retention: "0.80-0.90"
      content_cac: "medium"
    strengths:
      - "经常性收入"
      - "内容壁垒"
      - "品牌忠诚度"
    risks:
      - "内容成本上升"
      - "用户注意力竞争激烈"
      - "盗版与共享账号"
    maturity_stages:
      seed: "内容方向与早期受众验证"
      growth: "内容规模化与订阅增长"
      mature: "内容深度与生态扩展"
      decline: "多样化变现或平台转型"
    match_rules:
      - "rs_types_contains_content_subscription == true"
      - "vp_type == premium_content"
