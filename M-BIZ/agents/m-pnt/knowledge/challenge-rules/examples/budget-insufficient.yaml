id: cr-budget-insufficient
name: 预算与定位要求严重不匹配
risk_type: resource_mismatch
trigger_condition:
  - 定位需要高品质/高体验交付但预算显著低于品类中位线
  - 定位需要全国/区域品牌级传播力但预算低于基本启动线
  - 预算不够完成 6 个月的验证期
challenge_questions:
  - 这个定位在预算约束下还能交付 70% 吗？
  - 哪个维度可以降级而不破坏核心定位？
  - 最小可验证版本是什么？
typical_failure_signal:
  - 预算花完还没跑到验证拐点
  - 因缺钱被迫在核心体验上妥协
  - 定位与实际产出差距过大导致消费者负面印象
severity_level: R3
elimination_condition:
  - 预算覆盖不了核心定位的最小可交付版本
  - 经营者无备用资金或调整空间
mitigation_direction:
  - 收窄定位到预算可覆盖的最小场景
  - 用「慢启动」+「迭代验证」代替满配开业
  - 替换高成本交付项为低成本但感知不降级的替代方案
linked_patterns: []
linked_theories:
  - ye_maozhong
