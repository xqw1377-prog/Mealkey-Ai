id: cr-scene-not-authentic
name: 场景口号与体验脱节
risk_type: execution_fragility
trigger_condition:
  - 场景口号具体但门店在 3 项以上体验要素不支撑
  - 从「说的场景」到「做的场景」之间有明显感知断裂
challenge_questions:
  - 如果消费者因为场景口号进店，会失望吗？
  - 门店动线/菜单/服务中，有多少元素在强化这个场景？
  - 经营者自己能否用体验而不是口头解释来回答「这是什么地方」？
typical_failure_signal:
  - 进店后发现与预期不符
  - 消费者转述时只说「那家店挺乱的」
  - 场景话术在开业 3 个月后自然消失
severity_level: R3
elimination_condition:
  - 场景口号与门店实际体验有 3 项以上重大脱节
  - 经营者无法在 30 天内完成关键体验要素调整
mitigation_direction:
  - 将场景口号降到最小可交付版本
  - 优先改造 1-2 个关键触点，其余后续迭代
  - 用 30 天转述测试验证体验是否到位
linked_patterns:
  - pp-family-dining-brand
linked_theories:
  - ye_maozhong
  - trout
