id: pp-rebel-brand-positioning
name: 对立/颠覆型品牌定位
pattern_type: success_pattern
summary: 充当某个旧秩序的颠覆者，以「不做什么」定义自己并吸引同频消费者
typical_context:
  - 品类存在明显的主流「行规」或预期
  - 主流玩家都往同一个方向卷
  - 有一定文化反叛或年轻社交驱动力
trigger_signals:
  - 用户抱怨主流品牌的某类体验
  - 品类同质化语言泛滥
  - 目标客群有明确的「反感标签」
positioning_formula:
  - 反对旧标准 + 建立新规则 + 可感知的行为证言
success_reason: 对立面天生自带记忆与传播属性；「不做什么」比「做什么」更容易被转述
failure_modes:
  - 只有口号没有产品/体验支撑
  - 反过来成为噱头品牌，缺乏复购基础
  - 场景不支撑「颠覆」承诺，脱节
recommended_usage: 品类成熟、头部品牌心智固化但体验有短板时
not_recommended_when:
  - 客群偏保守、低频消费
  - 经营者资源无法支撑对立承诺
  - 品类场景不具备「表演性」与传播性
theory_alignment:
  - trout
  - ye_maozhong
