id: tr-trout-flanking-war
theory_source: trout
name: 侧翼战原则
principle: 不要与占有心智力第一的强势品牌打正面战，应在其无法或不愿覆盖的边缘寻找战场
decision_question: 这个方向是在正面进攻还是在打侧翼战？
applicable_context:
  - 品类已有强势领导者
  - 领导者在某一维度上存在盲区或不愿做的方向
  - 新品牌资源与领导者差距悬殊
key_variables:
  - 领导者核心优势所在的维度
  - 领导者不愿意进入或难以转身的方向
  - 侧翼战场是否有足够市场空间
decision_rules:
  - 侧翼战最好的切入点是领导者「优势中的弱点」
  - 侧翼战必须在独立的山头建立据点，不能只在价格上做文章
  - 侧翼成功后要快速巩固，防止领导者反扑
  - 进攻战是领导者的游戏，侧翼战才是挑战者的机会
anti_patterns:
  - 在领导者最强的维度上正面竞争（如「我们的服务比海底捞还好」）
  - 价格侧翼只带来短期流量不建立品牌资产
  - 侧翼战没有可防御的壁垒
output_implication: 若方向是正面进攻领导者，应转为侧翼或重新定位
theory_view_tag:
  - trout
  - flanking
  - warfare
