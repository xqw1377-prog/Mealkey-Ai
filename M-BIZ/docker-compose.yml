# 可选本地基础设施
# 当前应用默认开发链路使用 SQLite，不依赖本文件。
# 如果要切换到 PostgreSQL / Redis / MinIO（S3），再按需启动这些服务。
services:
  postgres:
    image: postgres:16-alpine
    container_name: mealkey-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mealkey
    ports:
      - "5432:5432"
    volumes:
      - mealkey-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mealkey-redis
    ports:
      - "6379:6379"
    volumes:
      - mealkey-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 本地 S3 兼容存储（Cloudflare R2 / AWS S3 的替代）
  minio:
    image: minio/minio:latest
    container_name: mealkey-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: mealkey
      MINIO_ROOT_PASSWORD: mealkeysecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - mealkey-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 创建默认 bucket: mealkey-assets
  minio-init:
    image: minio/mc:latest
    container_name: mealkey-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 mealkey mealkeysecret;
      mc mb -p local/mealkey-assets || true;
      mc anonymous set download local/mealkey-assets || true;
      echo 'MinIO bucket ready: mealkey-assets';
      "

volumes:
  mealkey-pg-data:
  mealkey-redis-data:
  mealkey-minio-data:
