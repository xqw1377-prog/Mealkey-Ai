rules:
- id: R-BM-030
  name: 价值主张完整性检查
  domain: VP
  expert: cpo
  level: 1
  category: structure_completeness
  condition:
    and:
    - metric: vp_description_exists
      operator: ==
      value: false
  conclusion:
    type: incomplete
    summary: 价值主张描述缺失，商业模式基础不完整
    severity: high
    confidence: 1.0
  suggestion: 请明确您的核心价值主张：您为客户解决什么核心问题？
- id: R-BM-031
  name: 客户细分完整性检查
  domain: CS
  expert: cpo
  level: 1
  category: structure_completeness
  condition:
    and:
    - metric: cs_primary_exists
      operator: ==
      value: false
  conclusion:
    type: incomplete
    summary: 目标客户细分未定义
    severity: high
    confidence: 1.0
  suggestion: 请明确您的目标客户是谁？核心客户画像是什么？
- id: R-BM-032
  name: 收入来源完整性检查
  domain: RS
  expert: cfo
  level: 1
  category: structure_completeness
  condition:
    and:
    - metric: rs_types_exists
      operator: ==
      value: false
  conclusion:
    type: incomplete
    summary: 收入来源未定义
    severity: high
    confidence: 1.0
  suggestion: 请说明您的收入来源：客户为什么付费？付费方式是什么？
- id: R-BM-033
  name: 渠道通路完整性检查
  domain: CH
  expert: coo
  level: 1
  category: structure_completeness
  condition:
    and:
    - metric: ch_types_count
      operator: ==
      value: 0
  conclusion:
    type: incomplete
    summary: 渠道通路未定义
    severity: medium
    confidence: 1.0
  suggestion: 请说明您的产品/服务通过什么渠道触达客户？
- id: R-BM-034
  name: 成本结构完整性检查
  domain: COST
  expert: cfo
  level: 1
  category: structure_completeness
  condition:
    and:
    - metric: has_cost_breakdown
      operator: ==
      value: false
  conclusion:
    type: incomplete
    summary: 成本结构明细未定义
    severity: medium
    confidence: 0.9
  suggestion: 请列出您的主要成本构成，这有助于评估盈利模型
- id: R-BM-035
  name: 核心资源完整性检查
  domain: KR
  expert: coo
  level: 1
  category: structure_completeness
  condition:
    and:
    - metric: unique_resource
      operator: ==
      value: false
    - metric: ka_primary_exists
      operator: ==
      value: false
  conclusion:
    type: incomplete
    summary: 核心资源与关键业务均未定义，商业模式缺乏支撑
    severity: high
    confidence: 0.9
  suggestion: 请说明您的核心资产是什么？最关键的业务活动是什么？
- id: R-BM-036
  name: 客户关系完整性检查
  domain: CR
  expert: coo
  level: 1
  category: structure_completeness
  condition:
    and:
    - metric: monthly_churn_rate
      operator: not_exists
      value: true
  conclusion:
    type: incomplete
    summary: 客户留存数据缺失，无法评估客户关系健康度
    severity: low
    confidence: 0.8
  suggestion: 建议开始追踪客户流失率与 NPS，建立数据驱动决策习惯
- id: R-BM-037
  name: 合作伙伴完整性检查
  domain: KP
  expert: coo
  level: 1
  category: structure_completeness
  condition:
    and:
    - metric: partner_count_ge_2
      operator: ==
      value: false
  conclusion:
    type: incomplete
    summary: 合作伙伴数量不足或有缺失
    severity: low
    confidence: 0.7
  suggestion: 考虑拓展 2-3 个关键合作伙伴，增强业务协同效应
- id: R-BM-040
  name: 价值主张-客户匹配度检查
  domain: VP
  expert: cpo
  level: 3
  category: consistency
  condition:
    and:
    - metric: vp_description_exists
      operator: ==
      value: true
    - metric: cs_primary_exists
      operator: ==
      value: false
  conclusion:
    type: inconsistency
    summary: 有价值主张描述但目标客户未定义，存在逻辑缺口
    severity: medium
    confidence: 0.8
  suggestion: 在明确目标客户后重新评估价值主张的匹配度
- id: R-BM-041
  name: 毛利率-获客成本一致性检查
  domain: COST
  expert: cfo
  level: 3
  category: consistency
  condition:
    and:
    - metric: gross_margin
      operator: exists
      value: true
    - metric: gross_margin
      operator: <
      value: 0.2
    - metric: cac
      operator: exists
      value: true
    - metric: cac
      operator: '>'
      value: 1000
  conclusion:
    type: inconsistency
    summary: 低毛利率 + 高获客成本，单位经济模型不可持续
    severity: high
    confidence: 0.9
  suggestion: 需同时优化成本结构和获客效率，否则商业模式难以长期持续
  verification_action_template: 请先计算您的单客 LTV，确认 LTV/CAC 是否 > 3，若低于 3 需优先调整定价或成本结构
- id: R-BM-042
  name: 高流失-高获客成本不匹配检查
  domain: CR
  expert: coo
  level: 3
  category: consistency
  condition:
    and:
    - metric: churn_under_5pct
      operator: ==
      value: false
    - metric: cac
      operator: '>'
      value: 5000
  conclusion:
    type: inconsistency
    summary: 高流失率 + 高获客成本 = 效率陷阱，边际收益持续恶化
    severity: high
    confidence: 0.85
  suggestion: 在加大获客投入前，优先降低流失率
- id: R-BM-043
  name: 高NPS-高流失率矛盾检查
  domain: CR
  expert: coo
  level: 3
  category: consistency
  condition:
    and:
    - metric: nps_ge_40
      operator: ==
      value: true
    - metric: churn_under_5pct
      operator: ==
      value: false
  conclusion:
    type: inconsistency
    summary: NPS 偏高但流失率也偏高，可能存在调研偏差或流失集中在特定客群
    severity: medium
    confidence: 0.7
  suggestion: 建议分客群分析流失率，识别出高NPS但流失的矛盾群体
- id: R-BM-044
  name: 高毛利-低定价合理性检查
  domain: COST
  expert: cfo
  level: 3
  category: consistency
  condition:
    and:
    - metric: margin_ge_60pct
      operator: ==
      value: true
    - metric: cac
      operator: '>'
      value: 10000
  conclusion:
    type: inconsistency
    summary: 高毛利率但获客成本极高，产品可能定价过高限制了市场覆盖
    severity: medium
    confidence: 0.65
  suggestion: 评估是否需要通过分层定价降低入门门槛，扩大市场覆盖
- id: R-BM-045
  name: 收入多来源-低ARPU矛盾检查
  domain: RS
  expert: cfo
  level: 3
  category: consistency
  condition:
    and:
    - metric: revenue_streams_count
      operator: '>='
      value: 3
    - metric: arpu
      operator: exists
      value: true
    - metric: arpu
      operator: <
      value: 200
  conclusion:
    type: inconsistency
    summary: 收入来源多样但客单价极低，可能存在变现分散问题
    severity: low
    confidence: 0.6
  suggestion: 评估各收入来源的贡献占比，聚焦高价值变现路径
- id: R-BM-010
  name: LTV/CAC 健康度判定
  domain: RS
  expert: cfo
  level: 2
  category: health_threshold
  condition:
    and:
    - metric: ltv_cac_ratio
      operator: exists
      value: true
    - metric: ltv_cac_ratio
      operator: <
      value: 3.0
  conclusion:
    type: warning
    summary: LTV/CAC 比值低于健康线 (3.0)，单位经济模型需优化
    severity: medium
    confidence: 0.8
  suggestion: 提升客户生命周期价值或降低获客成本
  verification_action_template: 请分别计算过去 {months} 个月的平均客户生命周期和平均获客成本，找出比值偏低的具体原因后再制定优化方案
- id: R-BM-011
  name: 营收增长率健康度判定
  domain: RS
  level: 2
  category: health_threshold
  condition:
    and:
    - metric: mrr_growth_rate
      operator: exists
      value: true
    - metric: mrr_growth_rate
      operator: <
      value: 0.05
  conclusion:
    type: warning
    summary: 月营收增长率低于 5%，增长动力不足
    severity: medium
    confidence: 0.75
  suggestion: 分析增长瓶颈，考虑优化获客策略或提升客单价
  verification_action_template: 请先拆解过去 {months} 个月的新客增长与老客增购数据，定位增长放缓的具体环节后再制定对策
  expert: cfo
- id: R-BM-012
  name: ARPU 健康度判定
  domain: RS
  level: 2
  category: health_threshold
  condition:
    and:
    - metric: arpu
      operator: exists
      value: true
    - metric: arpu
      operator: <
      value: 500
  conclusion:
    type: warning
    summary: ARPU 偏低（<500），客单价有提升空间
    severity: low
    confidence: 0.6
  suggestion: 评估向上销售或捆绑销售的可行性
  expert: cfo
- id: R-BM-013
  name: 客户集中度健康度判定
  domain: RS
  level: 2
  category: health_threshold
  condition:
    and:
    - metric: top_revenue_share
      operator: exists
      value: true
    - metric: top_revenue_share
      operator: '>='
      value: 0.7
  conclusion:
    type: warning
    summary: 收入高度依赖少数来源，存在集中度风险
    severity: high
    confidence: 0.85
  suggestion: 拓展收入来源，降低单来源依赖
  verification_action_template: 请分析 top 3 收入来源的客户占比，若单一客户占比 > 30% 需优先制定客户多元化计划
  expert: cfo
- id: R-BM-014
  name: NPS 健康度判定
  domain: CR
  level: 2
  category: health_threshold
  condition:
    and:
    - metric: nps
      operator: exists
      value: true
    - metric: nps
      operator: <
      value: 30
  conclusion:
    type: warning
    summary: NPS 低于 30，客户满意度有较大提升空间
    severity: medium
    confidence: 0.7
  suggestion: 建立客户反馈闭环，系统化改进产品与服务体验
  expert: coo
- id: R-BM-015
  name: 客户留存健康度判定
  domain: CR
  level: 2
  category: health_threshold
  condition:
    and:
    - metric: monthly_churn_rate
      operator: exists
      value: true
    - metric: monthly_churn_rate
      operator: '>='
      value: 0.05
  conclusion:
    type: warning
    summary: 月流失率 ≥ 5%，年度流失风险超过 46%
    severity: high
    confidence: 0.85
  suggestion: 建立客户健康度评分体系，主动干预高风险客户
  verification_action_template: 请提取过去 {months} 个月流失客户的登录频率/工单数/NPS数据，构建评分卡回测至 70%
    准确率再实施
  expert: coo
- id: R-BM-016
  name: 毛利率健康度判定
  domain: COST
  level: 2
  category: health_threshold
  condition:
    and:
    - metric: gross_margin
      operator: exists
      value: true
    - metric: gross_margin
      operator: <
      value: 0.3
  conclusion:
    type: warning
    summary: 毛利率低于 30%，盈利模型承压
    severity: high
    confidence: 0.8
  suggestion: 分析成本结构，识别优化空间或评估提价可行性
  verification_action_template: 请拆解过去 {months} 个月的成本明细，按固定/变动分类，找出占比前 3 的成本项再制定方案
  expert: cfo
- id: R-BM-017
  name: 市场规模健康度判定
  domain: CS
  level: 2
  category: health_threshold
  condition:
    and:
    - metric: tam
      operator: exists
      value: true
    - metric: tam
      operator: <
      value: 100000000
  conclusion:
    type: warning
    summary: 目标市场规模有限，增长天花板较低
    severity: medium
    confidence: 0.7
  suggestion: 评估拓展相邻市场的可能性，或考虑差异化定位获取更高溢价
  verification_action_template: 请调研 {n} 个相邻细分市场的规模和竞争格局，筛选 2-3 个备选市场再做决策
  expert: cso
- id: R-BM-018
  name: 获客成本占比营收判定
  domain: CH
  level: 2
  category: health_threshold
  condition:
    and:
    - metric: cac
      operator: exists
      value: true
    - metric: arpu
      operator: exists
      value: true
    - metric: cac
      operator: '>'
      value: 0
    - metric: arpu
      operator: '>'
      value: 0
  condition_script: cac / arpu > 0.5
  conclusion:
    type: warning
    summary: 获客成本占 ARPU 比例过高，单位经济模型需优化
    severity: high
    confidence: 0.75
  suggestion: 降低 CAC 或提升 ARPU，确保获客成本回收周期在 12 个月内
  expert: coo
- id: R-BM-001
  name: 收入来源单一性风险判定
  domain: RS
  level: 2
  category: risk_warning
  condition:
    and:
    - metric: revenue_streams_count
      operator: <=
      value: 1
    - metric: top_revenue_share
      operator: '>'
      value: 0.8
  conclusion:
    type: risk_warning
    summary: 收入来源高度单一，抗风险能力弱
    severity: high
    confidence: 0.85
  suggestion: 建议拓展多元化收入渠道，降低单来源依赖风险
  verification_action_template: 请补充 {months} 个月的真实 {revenue_type} 流水数据，分析各渠道收入占比后再决定拓展方向
  expert: cfo
- id: R-BM-002
  name: 获客成本偏高判定
  domain: CH
  level: 2
  category: risk_warning
  condition:
    and:
    - metric: cac
      operator: exists
      value: true
    - metric: cac
      operator: '>'
      value: 10000
  conclusion:
    type: risk_warning
    summary: CAC 超过 10000，获客成本处于高位
    severity: high
    confidence: 0.8
  suggestion: 审视获客渠道效率，优先压缩高 CAC 低转化渠道的预算
  verification_action_template: 请先收集过去 {months} 个月的渠道转化漏斗数据，识别流失最严重的环节后制定优化方案
  expert: coo
- id: R-BM-003
  name: 获客成本 vs 行业偏离判定
  domain: CH
  level: 2
  category: risk_warning
  condition:
    and:
    - metric: cac
      operator: exists
      value: true
    - metric: cac_vs_industry_ratio_exists
      operator: ==
      value: 1
    - metric: cac
      operator: '>'
      value: 5000
  conclusion:
    type: risk_warning
    summary: 获客成本显著高于行业水平
    severity: medium
    confidence: 0.75
  suggestion: 优化获客渠道组合，提升营销转化效率
  expert: coo
- id: R-BM-004
  name: 高客户流失风险判定
  domain: CR
  level: 2
  category: risk_warning
  condition:
    or:
    - metric: monthly_churn_rate
      operator: '>'
      value: 0.08
    - metric: nps
      operator: <=
      value: 20
  conclusion:
    type: risk_warning
    summary: 客户留存存在较高风险
    severity: high
    confidence: 0.8
  suggestion: 建议建立客户健康度监控体系，主动干预高风险客户
  verification_action_template: 请提取过去 {months} 个月已流失客户的共性特征（登录频率/工单数/NPS评分），构建简易评分卡，回测准确率达到
    70% 以上再实施
  expert: coo
- id: R-BM-005
  name: 毛利率偏低风险判定
  domain: COST
  level: 2
  category: risk_warning
  condition:
    and:
    - metric: gross_margin
      operator: exists
      value: true
    - metric: gross_margin
      operator: <
      value: 0.3
  conclusion:
    type: risk_warning
    summary: 毛利率偏低，盈利模型可持续性存疑
    severity: high
    confidence: 0.85
  suggestion: 分析成本结构，识别成本优化空间或评估提价可行性
  verification_action_template: 请先拆解过去 {months} 个月的成本明细，按固定/变动成本分类，找出占比最高的前 3 项成本再制定优化方案
  expert: cfo
- id: R-BM-006
  name: 市场容量不足风险判定
  domain: CS
  level: 2
  category: risk_warning
  condition:
    and:
    - metric: tam
      operator: exists
      value: true
    - metric: tam
      operator: <
      value: 100000000
  conclusion:
    type: risk_warning
    summary: 目标市场规模有限，增长天花板较低
    severity: medium
    confidence: 0.7
  suggestion: 评估拓展相邻市场的可能性，或考虑差异化定位获取更高溢价
  verification_action_template: 请先调研 {n} 个相邻细分市场的规模和竞争格局，筛选出 2-3 个可进入的备选市场再做决策
  expert: cso
- id: R-BM-007
  name: 核心资源可替代性风险
  domain: KR
  level: 2
  category: risk_warning
  condition:
    and:
    - metric: unique_resource
      operator: exists
      value: false
  conclusion:
    type: risk_warning
    summary: 缺乏独特核心资源，竞争壁垒薄弱
    severity: medium
    confidence: 0.7
  suggestion: 识别并构建差异化核心能力，如专利、数据资产、品牌认知
  verification_action_template: 请先完成一份竞争差异化分析报告，列出 top 3 竞争对手的核心资源与你方的差距，找出 1-2 个可构建的独特能力方向
  expert: coo
- id: R-BM-050
  name: 无营收风险判定
  domain: RS
  level: 2
  category: risk_warning
  condition:
    and:
    - metric: mrr
      operator: ==
      value: 0
  conclusion:
    type: risk_warning
    summary: 尚无营收，商业模式尚未被市场验证
    severity: high
    confidence: 0.9
  suggestion: 尽快推动 MVP 上线并获取第一批付费客户
  expert: cfo
- id: R-BM-051
  name: 无获客渠道风险判定
  domain: CH
  level: 2
  category: risk_warning
  condition:
    and:
    - metric: ch_types_count
      operator: ==
      value: 0
  conclusion:
    type: risk_warning
    summary: 未定义任何获客渠道，客户触达方式缺失
    severity: high
    confidence: 0.9
  suggestion: 至少确定 2-3 个核心获客渠道并开始小规模测试
  expert: coo
- id: R-BM-052
  name: 无痛点的价值主张风险
  domain: VP
  level: 2
  category: risk_warning
  condition:
    and:
    - metric: pain_point_ge_2
      operator: ==
      value: false
  conclusion:
    type: risk_warning
    summary: 客户痛点描述不清晰或不足，价值主张可能缺乏说服力
    severity: medium
    confidence: 0.7
  suggestion: 深度访谈至少 5 名目标客户，提炼 3 个以上真实痛点
  expert: cpo
- id: R-BM-053
  name: 无合作伙伴的独立运营风险
  domain: KP
  level: 2
  category: risk_warning
  condition:
    and:
    - metric: partner_count_ge_2
      operator: ==
      value: false
  conclusion:
    type: risk_warning
    summary: 缺少外部合作伙伴，业务可扩展性和抗风险能力受限
    severity: low
    confidence: 0.6
  suggestion: 识别 2-3 个具有互补能力的潜在合作伙伴
  expert: coo
- id: R-BM-020
  name: SaaS 订阅模式匹配
  domain: VP
  level: 3
  category: pattern_recognition
  condition:
    and:
    - metric: rs_types_contains_subscription
      operator: ==
      value: true
    - metric: vp_type
      operator: ==
      value: subscription_access
  conclusion:
    type: pattern
    summary: 符合 SaaS 订阅模式特征
    confidence: 0.8
