id: case-taikang-zhajiangmian
brand_name: 太康炸酱面（化名）
category: 面馆/快餐
city_context: 郑州
market_stage: 成熟期
project_stage: 品牌升级
initial_problem: 在郑州这个面食消费大市，面馆林立但同质化严重，消费者选面馆基本看「谁离得近」
resource_condition: 5家门店，300万升级预算，创始人有20年传统面馆经验
competition_context: 竞品几乎全部定位「老味道」「手工面」「祖传配方」，消费者分不清谁是谁
candidate_positions:
  - 「郑州最好吃的炸酱面」——无法验证
  - 「30年老味道」——竞品都在说
  - 「一碗炸酱面，半碗都是料」——冲突明确，可感知
final_position: 「一碗炸酱面，半碗都是料」——以"料多"这个可感知的物理维度建立区隔
why_choose: 竞品都在讲虚的（老味道/传承），没人讲实的；「料多」是一眼可见的物理差异，且与消费者"面馆给的肉越来越少"的痛点形成冲突
why_not_others: 「最好吃」无法验证；「老味道」没有区隔力
differentiation_design: 碗比竞品大一圈、面少料多（视觉冲击）、可自选加料台、煮面窗口透明化展示
execution_actions:
  - 更换碗具为大口径浅碗（视觉上料更多）
  - 推出「加料区」让消费者自定义料量
  - 价格不变但明显增加料量，形成「超预期」
  - 门头口号换成「一碗炸酱面，半碗都是料」
market_feedback: 开业3个月复购率提升40%，「料多」成为郑州面食圈子里的口碑；消费者自发在抖音上发对比视频
result_summary: 利用物理维度的可感知差异，在极度同质化的品类中找到了一条低成本、高效率的区隔路径
success_or_failure: success
quality_tier: gold_case
mental_takeaway: 同质化品类最佳策略不是讲一个更好的故事，而是给一个可感知的物理差异
reusable_principles:
  - 物理维度的差异比情感维度更有说服力（看得见的"多"比"老味道"更有效）
  - 消费者的「不满意」是最低成本的市场缺口
  - 差异化越具体越好传播
risk_lessons:
  - 竞品可以迅速增加料量跟进，需要提前预备下一步
  - 如果成本控制不好，"料多"会成为利润杀手
