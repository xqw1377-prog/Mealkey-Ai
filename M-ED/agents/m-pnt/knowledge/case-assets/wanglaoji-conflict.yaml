id: case-wanglaoji-conflict
brand_name: 王老吉
category: 凉茶/饮料
city_context: 全国
market_stage: 成长期
project_stage: 品牌重塑
initial_problem: 凉茶作为广东地方品类，在全国市场几乎没有认知，消费者不知道凉茶是什么、为什么喝
resource_condition: 加多宝集团有强大渠道能力，但早期消费者教育成本极高
competition_context: 饮料品类心智地图里没有「凉茶」这个位置；可口可乐占「可乐」、康师傅占「茶饮」、红牛占「功能饮料」
candidate_positions:
  - 「正宗广东凉茶」——区域标签无法全国化
  - 「健康草本饮料」——品类模糊
  - 「怕上火，喝王老吉」——冲突清晰、场景明确
final_position: 「怕上火，喝王老吉」——以「上火」这个全民焦虑为冲突点，绑定「火锅/烧烤/熬夜」场景
why_choose: 「上火」是中国消费者最普遍的健康焦虑之一，而凉茶=去火的认知在广东已有基础；通过绑定高频场景（火锅烧烤），让消费者形成条件反射
why_not_others: 「正宗广东凉茶」太窄；「健康饮料」太宽无法建立心智位置
differentiation_design: 红色包装与竞品形成鲜明区隔；「怕上火」三个字直接制造"你不怕吗"的心理暗示
execution_actions:
  - 广告语全国轰炸「怕上火，喝王老吉」
  - 绑定火锅店/烧烤店/夜宵摊等高频场景
  - 红色罐装设计在货架上形成视觉霸盘
  - 统一零售价（比竞品略高，建立品质感）
market_feedback: 「怕上火，喝王老吉」成为中国最成功的广告语之一；王老吉从区域品牌跃升为全国性品牌，年销售额超200亿
result_summary: 冲突营销的教科书案例：利用全民焦虑（上火）+高频场景（火锅烧烤）+明确解决方案（王老吉），建立了条件反射式的品牌联想
success_or_failure: success
quality_tier: gold_case
mental_takeaway: 最好的定位是利用消费者已有的焦虑/不满/冲突，而不是创造一个新概念
reusable_principles:
  - 冲突必须是消费者"本来就在意"的，不需要你去教育
  - 定位语=条件反射触发器：听到场景→想起焦虑→想到你的品牌
  - 高频场景绑定比品牌故事更有效
risk_lessons:
  - 单一功能定位的天花板明显（上火的场景有限）
  - 品牌延伸困难（王老吉后来推出的其他产品鲜有成功）
theory_tags:
