# ChallengeRule — 风险挑战与红队规则
object_type: ChallengeRule
fields:
  id: string
  name: string
  risk_type: enum[
    mental_confusion,
    customer_blur,
    scene_weakness,
    competition_overlap,
    resource_mismatch,
    execution_fragility,
    defensibility_low
  ]
  trigger_condition: list[string]
  challenge_questions: list[string]
  typical_failure_signal: list[string]
  # 全库统一 R1–R4，不使用 R5
  severity_level: enum[R1, R2, R3, R4]
  elimination_condition: list[string]
  mitigation_direction: list[string]
  linked_patterns: list[string]
  linked_theories: list[string]
