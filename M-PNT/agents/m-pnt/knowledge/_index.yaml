# M-PNT 跨资产索引 V2
# 不存储知识内容，只记录资产间关系和查询路径
version: "2.0"
created_at: "2026-07-12"

# ─── 关系定义 ──────────────────────────────────────────────────
# relation 类型：
#   supports      规则 → 案例（该规则被案例验证）
#   triggers      规则 → 风险（违反规则导致的风险）
#   mitigated_by  风险 → 模式（该风险的缓解定位模式）
#   follows       案例 → 模式（案例遵循的定位模式）
#   exemplifies   案例 → 模式（案例作为某模式的典型示例）

relations:
  # ═══ Ries 聚焦法则 ═══════════════════════════════════════════
  - from_type: TheoryRule
    from_id: tr-ries-focus-principle
    to_type: CaseAsset
    to_id: case-chayan-yueSe
    relation: supports
    strength: strong
    note: "茶颜悦色聚焦'中国风茶饮'单一概念，验证聚焦法则"

  - from_type: TheoryRule
