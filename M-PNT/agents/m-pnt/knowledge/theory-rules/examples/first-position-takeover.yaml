id: tr-ries-first-position-takeover
theory_source: ries
name: 第一位置抢占
principle: 品牌应聚焦于在消费者心智中占据一个品类或场景的「第一」位置
decision_question: 这个方向能否在心智中形成可长期占有的第一位置？
applicable_context:
  - 品类处于成长期或成熟早期
  - 竞品没有明确心智锚点
  - 经营者有先发或局部资源优势
key_variables:
  - 品类心智空白度
  - 竞品第一联想强度
  - 经营者持续投入能力
decision_rules:
  - 若目标品类已有强势领导者，不应正面硬攻其第一联想
  - 「第一」必须在真实消费场景中被验证而非自封
  - 聚焦单一概念比多概念叠加更容易占住第一
anti_patterns:
  - 宣称「品类开创者」但消费者不认可
  - 同时争夺多个「第一」概念
  - 领导资产无法被供给持续强化
output_implication: 若能占第一，定位语应围绕「品类/场景 + 第一/首选」；若不能，应转向区隔或空位
theory_view_tag:
  - ries
  - first_mover
  - focus
