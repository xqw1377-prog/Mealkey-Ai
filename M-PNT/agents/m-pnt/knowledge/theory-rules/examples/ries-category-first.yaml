id: tr-ries-category-first
theory_source: ries
name: 品类第一原则
principle: 品牌应聚焦于在消费者心智中占据一个品类或子品类的「第一」位置
decision_question: 这个方向是否有机会在心智中形成可长期占有的「品类第一」认知？
applicable_context:
  - 品类正处于成长期或成熟早期
  - 品类心智分散，尚无明确领导者
  - 经营者有局部资源优势或先发优势
key_variables:
  - 品类心智空白度
  - 竞品第一联想强度
  - 经营者持续聚焦的能力
decision_rules:
  - 如果品类已有强势领导者，不应正面硬攻其品牌认知
  - 「第一」必须基于消费者真实认知，不能是自封
  - 聚焦单一概念比多概念更容易占据第一
  - 第一的占位需要持续的供给强化，不是一次性口号
anti_patterns:
  - 声称「品类开创者」但消费者认知中被归为跟随者
  - 同时争夺多个「第一」概念（如「第一好吃又第一便宜」）
  - 领导资产无法被持续的供给质量印证
  - 用「更好的」替代「第一的」
output_implication: 若能占第一，定位语应围绕「品类/场景+第一/首选」构建；若不能，应放弃该方向或开创子品类
theory_view_tag:
