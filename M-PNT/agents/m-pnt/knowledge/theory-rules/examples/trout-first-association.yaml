id: tr-trout-first-association
theory_source: trout
name: 第一联想法则
principle: 定位的终极目标不是让消费者知道你的品牌，而是在特定需求出现时，你的品牌是第一个被想起的
decision_question: 消费者在产生某个需求时，会第一个想起这个品牌吗？
applicable_context:
  - 品类竞争激烈
  - 品牌需要建立明确的心智锚点
  - 多个品牌在同一赛道竞争
key_variables:
  - 消费者对品类需求的触发场景
  - 需求触发的第一时间会联想到的品牌
  - 品牌与需求的关联强度
decision_rules:
  - 如果消费者在产生需求时不会自然联想到你，定位尚未成功
  - 第一联想比品牌知名度更重要（知道你不等于需要你时想起你）
  - 第一联想必须绑定一个具体的需求场景
  - 检查竞品的第一联想是什么，避免进入已被占稳的意识领域
anti_patterns:
  - 认为高知名度=高心智占有率
  - 同时绑定多个不相关的需求联想
  - 联想点是CEO想象中的而不是真实消费者认知中的
output_implication: 第一联想的方向应作为品牌定位核心，其余的联想都是次要的
theory_view_tag:
  - trout
  - association
  - mental
