id: cr-competitor-copy-easy
name: 差异化易被竞品跟进
risk_type: competition_overlap
trigger_condition:
  - 核心差异不涉及供应链壁垒、品牌资产或特定场景
  - 竞品可以在 3 个月内以低成本模仿差异化承诺
  - 差异化未与品类位置或场景绑定，只是「更好」
challenge_questions:
  - 竞品要复制这个差异，需要什么门槛？
  - 如果竞品跟进了，我们还有第二道防线吗？
  - 这个差异是「不同」还是「更好」？
typical_failure_signal:
  - 竞品在 3-6 个月内推出类似定位和产品
  - 消费者无法分辨两个品牌的差异
  - 品牌不得不降价或加量维持竞争优势
severity_level: R3
elimination_condition:
  - 差异化没有任何可防性壁垒
  - 竞品已在同向布局
mitigation_direction:
  - 在差异化上叠加场景或心智绑定的第二层壁垒
  - 把差异从产品层面升级为品牌/体验层面
  - 通过持续表达和强化占据第一联想
linked_patterns:
  - pp-rebel-brand-positioning
linked_theories:
  - trout
  - ries
