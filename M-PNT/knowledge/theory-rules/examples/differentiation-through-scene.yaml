id: tr-ye-differentiation-through-scene
theory_source: ye_maozhong
name: 场景差异比产品差异更可防
principle: 在中国餐饮市场，产品易被跟，场景与冲突记忆更难复制
decision_question: 这个方向的核心差异是产品还是场景/冲突？
applicable_context:
  - 品类同质化严重
  - 产品配方无专利保护
  - 竞品价格战激烈
key_variables:
  - 场景唯一性
  - 冲突记忆强度
  - 体验交付一致性
decision_rules:
  - 如果差异只靠一个菜品，给 not_recommend 除非有供应链壁垒
  - 场景差异必须可被消费者自传播证实
  - 冲突记忆必须基于真实消费者心理，而非编造概念
anti_patterns:
  - 「特色菜」作为唯一差异，竞品跟进只需改菜单
  - 场景口号动听但门店体验穿帮
  - 冲突只是广告创意而非消费者真实感受
output_implication: 场景类定位须在 Action 中写清体验交付标准；冲突类须写清最小验证动作
theory_view_tag:
  - ye_maozhong
  - scene
  - defensibility
