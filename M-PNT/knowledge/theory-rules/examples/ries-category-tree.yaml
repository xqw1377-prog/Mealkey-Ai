id: tr-ries-category-tree
theory_source: ries
name: 品类树分化原则
principle: 品牌随着时间推移会分化出新的品类分支，开创新分支比在已有分支竞争更容易成为第一
decision_question: 这个方向是在现有品类中竞争，还是在开创新品类分支？
applicable_context:
  - 品类已进入成熟期且竞争饱和
  - 消费者需求开始出现细分趋势
  - 科技或文化变化带来品类分化机会
key_variables:
  - 品类自然分化趋势
  - 新分支的消费者认知接受度
  - 在分支中成为第一的可行性
decision_rules:
  - 品类总是分化而不是汇合（火锅分化为：川式火锅、潮汕牛肉火锅、一人食火锅等）
  - 在新品类分支中，第一个进入的品牌自动获得「原装正品」的心智优势
  - 分化出的子品类越具体，越容易占据第一位置
  - 不要试图创造消费者不认知的品类
anti_patterns:
  - 把品牌名当作品类名（如「我要去吃X」—X是品牌不是品类则未建立品类认知）
  - 过度细分到消费者不理解的程度
  - 在已有强势分支做跟随者而非开创者
output_implication: 若现有品类已无第一机会，应考虑是否有一条品类分化的新路径
theory_view_tag:
  - ries
  - category
  - differentiation
