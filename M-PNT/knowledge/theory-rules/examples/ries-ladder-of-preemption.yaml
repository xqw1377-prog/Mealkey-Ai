id: tr-ries-ladder-of-preemption
theory_source: ries
name: 心智阶梯原则
principle: 消费者在购买决策时会在心智中排列品牌顺序，只有阶梯顶端的品牌才能被优先选择
decision_question: 这个方向能否帮助品牌进入心智阶梯的前三位？
applicable_context:
  - 品类已处于成熟期
  - 市场已有多家品牌占据心智位置
  - 新品牌试图进入已有领导者赛道
key_variables:
  - 消费者对品类现有品牌的联想强度
  - 新品牌与已有品牌的差异度
  - 新品牌被选择的优先级
decision_rules:
  - 如果品牌无法进入目标客群心智阶梯的前三，应重新选择细分场景
  - 心智阶梯上的位置不是靠钱买来的，是靠占据一个独特概念获得的
  - 与其在前三之外挣扎，不如开创新品类或新阶梯
  - 消费者心智中的品牌阶梯通常只有七格（±2）
anti_patterns:
  - 认为「我比第一名做得更好所以我会取代他」
  - 在已有强势品牌的阶梯上不断加价竞争
  - 试图通过广告轰炸跳过心智阶梯的建立过程
output_implication: 若该方向无法进入心智前三，必须转换赛道或做场景切割
theory_view_tag:
  - ries
  - ladder
  - mental_position
