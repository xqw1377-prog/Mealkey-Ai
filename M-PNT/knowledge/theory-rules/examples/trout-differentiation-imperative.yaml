id: tr-trout-differentiation-imperative
theory_source: trout
name: 差异化是唯一出路
principle: 在同质化的市场里，「更好」不是定位，「不同」才是——消费者只为"不一样"买单
decision_question: 这个定位能让消费者在3秒内说出「它和别家有什么不同」吗？
applicable_context:
  - 品类同质化严重
  - 头部品牌已经形成心智固化
  - 新进入者或品牌升级阶段
key_variables:
  - 与竞品的差异化清晰度
  - 差异化是否基于消费者可感知的维度
  - 差异化是否容易被竞品跟进
decision_rules:
  - 如果换一个品牌名仍然可以说同样的话，差异化没有建立
  - 差异化必须能被一句话转述给朋友
  - 差异化维度越少越好：一个就够了
  - 有形的差异比无形的差异更有说服力
anti_patterns:
  - 「我们更好吃/更好服务/更好品质」—这是「更好」不是「不同」
  - 差异化太多等于没有差异化
  - 差异化在CEO脑子里面而不在消费者感知中
  - 差异化依赖于某些消费者看不到的供应链细节
output_implication: 若定位语无法在3秒内与竞品形成区分，应返回重新设计差异化
theory_view_tag:
  - trout
  - differentiation
  - competition
