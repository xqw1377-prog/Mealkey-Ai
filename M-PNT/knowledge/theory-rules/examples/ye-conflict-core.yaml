id: tr-ye-conflict-core
theory_source: ye_maozhong
name: 冲突是营销的第一原理
principle: 营销的本质不是满足需求，而是发现冲突、放大冲突、利用冲突——让消费者觉得「以前我一直在将就」
decision_question: 这个定位是否创造了一个可感知的「旧选择 vs 新选择」的冲突？
applicable_context:
  - 品类存在明显未被满足的体验缺口
  - 消费者的现有选择存在某种妥协或牺牲
  - 品牌需要快速建立差异认知
key_variables:
  - 冲突的真实性（消费者是否能共鸣）
  - 冲突的传播性（能否被一句话转述）
  - 冲突的成交力（冲突是否指向一个具体的购买决策）
decision_rules:
  - 没有冲突就没有记忆——消费者每天被几千条信息轰炸，没有冲突感的信息等于没发
  - 冲突必须基于消费者的真实感受，不能是编造的概念
  - 好的冲突结构：「以前你得……现在你可以……」
  - 冲突必须能指向一个具体的购买决策，不能只停留在话题层面
anti_patterns:
  - 编造消费者并不感受的「伪冲突」
  - 冲突只在广告中存在，产品没有兑现冲突承诺
  - 冲突过于抽象消费者无法理解（「冲突你的平庸」—这是什么意思？）
  - 为冲突而冲突，忽略了品牌的长期建设
output_implication: 没有清晰冲突结构的方向应降低优先级，除非在传播资源上足够充裕
theory_view_tag:
  - ye_maozhong
  - conflict
  - memory
