id: tr-ye-execution-reality
theory_source: ye_maozhong
name: 落地执行否决权
principle: 任何定位如果不能被经营者在真实条件下落地执行，无论理论上多精彩，都是无效的
decision_question: 如果只有70%的预算和70%的执行力，这个定位还能成立吗？
applicable_context:
  - 经营者预算有限（<50万）
  - 经营者无餐饮连锁经验
  - 定位要求高标准的体验交付
key_variables:
  - 定位的最小可交付版本是否存在
  - 定位对产品/空间/服务的要求是否匹配团队能力
  - 经营者资源是否能支撑定位的持续强化
decision_rules:
  - 如果定位要求消费者感知到的体验，实际做出来只有60分，定位就是负资产
  - 预算与定位要求不匹配时，宁可收窄定位也不要用口号代替体验
  - 检查定位最强的承诺点：这个承诺能每天兑现吗？
  - 30天验证是最低要求：如果30天无法验证定位是否成立，说明定位缺少可执行路径
anti_patterns:
  - 「先喊出来再做出来」—如果做不出来就永远做不出来
  - 定位语和实际体验差两个档次以上
  - 定位依赖一个不存在的执行力
output_implication: 不可执行的方向应给予not_recommend或标记为R3+
theory_view_tag:
  - ye_maozhong
  - execution
  - reality
