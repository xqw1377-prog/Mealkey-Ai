id: case-guyue-longjing
brand_name: 古茗茶饮
category: 茶饮
city_context: 浙江台州起家
market_stage: 成长后期
project_stage: 品牌定位清晰化
initial_problem: 茶饮市场中低端品牌心智模糊，CoCo、一点点、蜜雪冰城各占不同位置，新品牌只能在中间地带挣扎
resource_condition: 区域供应链基础扎实，创始人有茶叶背景
competition_context: 高端=喜茶奈雪/中端中低价=CoCo一点点/极致低价=蜜雪冰城；中间地带宽但无明确的品牌心智
candidate_positions:
  - 「更好的奶茶」——无区隔
  - 「水果茶专家」——但已有品牌在做
  - 「每天一杯喝不腻」——日常场景绑定
final_position: 「每天一杯喝不腻」+ 区域密集深耕策略——不做全国网红，做区域日常
why_choose: 不追逐茶饮的「网红化」，以高频低客单的日常场景建立复购；聚焦区域密度而非全国覆盖
why_not_others: 「更好的奶茶」没有位置；「水果茶专家」门槛不高
differentiation_design: 产品上主打「水果+茶」的清爽口感但不上高端定价；门店不做大店模型做社区型小店
execution_actions:
  - 区域深耕：在一个区域做到密度第一再扩张到下一个
  - 不做全国性广告，口碑靠区域密度传播
  - 产品对标比喜茶便宜30-50%，比一点点多一点"新鲜感"
  - 供应链从茶叶源头自建，控制成本确保品质
market_feedback: 在茶饮品牌大量关店的2023-2024年，古茗逆势增长，成为中国门店规模最大的茶饮品牌之一
result_summary: 不争做第一，做「最稳的日常选择」——聚焦区域、控制成本、高频复购，验证了里斯"聚焦"理论的区域版
success_or_failure: success
quality_tier: gold_case
mental_takeaway: 不是所有品类都需要做"第一"，在某些品类中做"最可靠的日常选择"比做"网红"更有长期价值
reusable_principles:
  - 区域聚焦策略：在成为全国第一之前，先成为区域第一
  - 中端市场的定位不是「比高端便宜」，而是「日常首选」
  - 高频复购比网红打卡更有长期价值
risk_lessons:
  - 区域策略在品牌势能上会输给全国性品牌
  - 不做品牌传播是双刃剑：省了钱但品牌认知建立慢
theory_tags:
  - ries
  - ye_maozhong
