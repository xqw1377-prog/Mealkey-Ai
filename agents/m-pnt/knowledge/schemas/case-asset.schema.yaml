# CaseAsset — 围绕品牌定位决策过程的案例对象
object_type: CaseAsset
fields:
  id: string
  brand_name: string
  category: string
  city_context: string
  market_stage: string
  project_stage: string
  initial_problem: string
  resource_condition: string
  competition_context: string
  candidate_positions: list[string]
  final_position: string
  why_choose: string
  why_not_others: string
  differentiation_design: string
  execution_actions: list[string]
  market_feedback: string
  result_summary: string
  success_or_failure: enum[success, failure, mixed]
  quality_tier: enum[gold_case, silver_case, bronze_case]
  mental_takeaway: string
  reusable_principles: list[string]
  risk_lessons: list[string]
  theory_tags: list[string]
required_minimum:
  - competition_context
  - candidate_positions
  - why_choose
  - result_summary
  - reusable_principles
