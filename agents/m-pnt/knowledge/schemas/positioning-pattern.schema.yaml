# PositioningPattern — 高频定位模式（成功 / 失败 / 策略）
object_type: PositioningPattern
fields:
  id: string
  name: string
  pattern_type: enum[success_pattern, failure_pattern, strategy_pattern]
  summary: string
  typical_context: list[string]
  trigger_signals: list[string]
  positioning_formula: list[string]
  success_reason: string
  failure_modes: list[string]
  recommended_usage: string
  not_recommended_when: list[string]
  theory_alignment: list[string]
