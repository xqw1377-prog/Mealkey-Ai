id: tr-ye-scene-memory
theory_source: ye_maozhong
name: 场景是冲突的载体
principle: 抽象的品牌概念消费者记不住，冲突必须绑定一个具体场景才能被激活和传播
decision_question: 这个定位的冲突是否绑定了一个消费者每天会遇到的高频场景？
applicable_context:
  - 品牌处于起步阶段需要快速建立认知
  - 传播预算有限
  - 品类本身抽象或复杂
key_variables:
  - 场景的真实性（是否存在、是否高频）
  - 场景与冲突的相关性（场景是否自然触发冲突认知）
  - 场景的传播性（能否一句话描述）
decision_rules:
  - 没有场景的冲突是空中楼阁，消费者不知道怎么用
  - 场景越具体越好：「周末家庭聚餐」比「家人团聚」好
  - 场景必须是高频的，低频场景无法支撑品牌记忆
  - 一个好的场景定位会让消费者想「对的！我就是这样！」
anti_patterns:
  - 虚构一个消费者生活中不存在的场景
  - 场景太宽泛（「任何时候」= 没场景）
  - 场景与产品体验不一致（说好了夜宵场景但晚上8点关门）
output_implication: 无具体场景绑定的方向，须在Action中补充场景定位策略
theory_view_tag:
  - ye_maozhong
  - scene
  - memory
