<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>清理本地缓存 · MealKey</title>
  </head>
  <body
    style="
      font-family: system-ui, sans-serif;
      max-width: 36rem;
      margin: 3rem auto;
      padding: 0 1.25rem;
      line-height: 1.6;
      color: #202124;
      background: #f7f6f2;
    "
  >
    <h1 style="font-size: 1.25rem">清理本地缓存</h1>
    <p>
      对话页卡在「加载中」时，多半是浏览器里旧的 Service Worker /
      Cache 劫持了 localhost:3000。
    </p>
    <p id="status">正在清理…</p>
    <p style="margin-top: 1.5rem">
      <a
        id="go"
        href="/login"
        style="
          display: inline-flex;
          min-height: 44px;
          align-items: center;
          padding: 0 1rem;
          border-radius: 14px;
          background: #181817;
          color: #fff;
          text-decoration: none;
          font-weight: 600;
        "
        >清理后去登录</a
      >
    </p>
    <script>
      (async function () {
        var status = document.getElementById("status");
        var go = document.getElementById("go");
        try {
          if ("serviceWorker" in navigator) {
            var regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(
              regs.map(function (r) {
                return r.unregister();
              }),
            );
          }
          if ("caches" in window) {
            var keys = await caches.keys();
            await Promise.all(
              keys.map(function (k) {
                return caches.delete(k);
              }),
            );
          }
          try {
            localStorage.clear();
          } catch (e) {}
          try {
            sessionStorage.clear();
          } catch (e) {}
          status.textContent =
            "已清理完成。3 秒后自动跳转登录；也可点下方按钮。";
          setTimeout(function () {
            location.replace("/login?cleared=1");
          }, 3000);
        } catch (e) {
          status.textContent =
            "清理失败：" + (e && e.message ? e.message : String(e));
          go.textContent = "仍去登录";
        }
      })();
    </script>
  </body>
</html>
